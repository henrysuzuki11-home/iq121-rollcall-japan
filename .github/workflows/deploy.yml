name: Deploy to GitHub Pages

on:
  # Run on every push to the default branch.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions required for GitHub Pages deployment via Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Builds the Astro site and uploads the dist/ folder as a Pages artifact.
      # `site` and `base` are read from astro.config.mjs.
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
